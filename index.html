<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Master Planner</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ical.js/1.5.0/ical.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>

    <style>
        :root {
            --bg-dark: #131314;       
            --bg-panel: #1e1f20;      
            --accent: #a8c7fa;        
            --text-main: #e3e3e3;     
            --text-muted: #c4c7c5;    
            --outline: #444746;       
            --hazard: repeating-linear-gradient(45deg, rgba(255,82,82,0.1), rgba(255,82,82,0.1) 10px, rgba(0,0,0,0.3) 10px, rgba(0,0,0,0.3) 20px);
            --xp-color: #00e5ff;      
        }
        body { margin: 0; font-family: 'Rajdhani', sans-serif; font-size: 18px; background-color: var(--bg-dark); color: var(--text-main); display: flex; flex-direction: column; height: 100vh; }
        .topbar { background-color: var(--bg-dark); padding: 10px 20px; display: flex; gap: 15px; border-bottom: 1px solid var(--outline); align-items: center; }
        .logo { font-size: 24px; font-weight: 700; color: var(--accent); margin-right: 10px; }
        .subbar { background-color: var(--bg-panel); padding: 10px 20px; display: flex; gap: 15px; border-bottom: 1px solid var(--outline); align-items: center; }
        .tab-btn { background: rgba(0,0,0,0.2); border: 1px solid var(--outline); color: var(--text-muted); padding: 6px 14px; border-radius: 15px; cursor: pointer; font-weight: 700; font-size: 15px; transition: 0.2s; white-space: nowrap; font-family: 'Rajdhani', sans-serif; letter-spacing: 1px; display: flex; align-items: center; justify-content: center; }
        .tab-btn:hover { border-color: var(--accent); color: var(--accent); }
        .tab-btn.active { background-color: var(--accent); color: var(--bg-dark); border-color: var(--accent); }
        .action-btn { background-color: #282a2c; color: var(--text-main); border-color: var(--outline); }
        .notification-badge { background-color: #ff5252; color: white; border-radius: 12px; padding: 2px 6px; font-size: 13px; font-weight: 800; margin-left: 8px; font-family: 'Share Tech Mono', monospace; box-shadow: 0 0 8px rgba(255, 82, 82, 0.6); display: inline-block; }
        @keyframes focus-pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0.6); } 70% { box-shadow: 0 0 0 10px rgba(255, 152, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 152, 0, 0); } }
        .btn-focus { background: rgba(255, 152, 0, 0.2); color: #ff9800; border-color: #ff9800; margin-left: auto; }
        .btn-focus.active-pulse { animation: focus-pulse 1.5s infinite; background: #ff9800; color: #131314; }
        .container { display: flex; flex: 1; overflow: hidden; }
        .content { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; }
        .xp-container { background: rgba(255,255,255,0.02); border: 1px solid var(--outline); padding: 20px; border-radius: 8px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); position: relative; overflow: hidden; flex-shrink: 0; }
        .global-task-progress { position: absolute; top: 0; left: 0; bottom: 0; width: 0%; background: rgba(255, 255, 255, 0.08); z-index: 0; transition: width 1s linear; }
        .xp-content-wrapper { position: relative; z-index: 1; display: flex; width: 100%; align-items: center; gap: 25px; }
        .avatar-img { height: 130px; width: auto; image-rendering: pixelated; border-radius: 4px; }
        .xp-bar-bg { background: #2a2b2c; height: 16px; border-radius: 10px; overflow: hidden; position: relative; box-shadow: inset 0 2px 5px rgba(0,0,0,0.5); }
        .xp-bar-fill { background: linear-gradient(90deg, #0097a7, var(--xp-color)); height: 100%; width: 0%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px var(--xp-color); }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.9); padding: 12px 24px; border-radius: 30px; font-weight: bold; border: 1px solid; z-index: 3000; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
        .form-group label { color: var(--text-muted); font-size: 14px; text-transform: uppercase; margin-bottom: 5px; }
        .form-group input, .form-group select, .form-group textarea { background: rgba(0,0,0,0.3); border: 1px solid var(--outline); color: white; padding: 10px; border-radius: 4px; font-family: 'Rajdhani'; font-size: 16px; }
        .btn-submit { background: var(--accent); color: var(--bg-dark); border: none; padding: 10px 20px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-content { background: var(--bg-panel); padding: 30px; border-radius: 8px; border: 1px solid var(--accent); width: 90%; max-width: 650px; position: relative; }
    </style>
</head>
<body>

    <div class="topbar">
        <div class="logo">🎯 <span>The Master Planner</span></div>
        <div class="term-controls">
            <select id="inp-term-selector" class="term-select" onchange="switchTerm(this.value)"></select>
        </div>
        <div id="sydney-clock" style="margin-left: auto; color: var(--accent); font-family: 'Share Tech Mono';">Loading...</div>
    </div>

    <div class="subbar">
        <button class="tab-btn action-btn active" data-view="dashboard">🏠 Dashboard</button>
        <button class="tab-btn action-btn" data-view="missions">⚔️ Missions <span id="missions-badge" class="notification-badge hidden">0</span></button>
        <button class="tab-btn action-btn" data-view="settings">⚙️ Settings</button>
        <button id="btn-focus-mode" class="tab-btn btn-focus" onclick="openFocusMode()" disabled>🔥 Focus Mode</button>
    </div>

    <div class="container">
        <div class="content" id="main-content">
            <div class="xp-container">
                <div class="global-task-progress" id="global-task-progress"></div>
                <div class="xp-content-wrapper">
                    <img src="avatar.gif" alt="Brandon Lee" class="avatar-img">
                    <div style="flex: 1;">
                        <strong style="font-size: 36px; display: block;">Brandon Lee</strong>
                        <span id="player-xp-text" style="font-family: 'Share Tech Mono'; font-size: 24px;">0 XP</span>
                        <div class="xp-bar-bg" style="margin-top: 10px;"><div class="xp-bar-fill" id="xp-bar-fill"></div></div>
                    </div>
                </div>
            </div>

            <div id="view-settings">
                <h2 style="color: var(--accent);">⚙️ System Settings</h2>
                <div class="builder-section" style="background: rgba(255,255,255,0.02);">
                    <h3 style="color: #ff5252;">Accountability Partners</h3>
                    <p style="color: var(--text-muted);">Enter emails separated by commas.</p>
                    <div class="form-group">
                        <input type="text" id="inp-partner-email" placeholder="email1@test.com, email2@test.com">
                    </div>
                    <button class="btn-submit" onclick="saveSettings()">Save Targets</button>
                    <div id="settings-msg" style="margin-top: 10px; font-weight: bold;"></div>
                </div>
            </div>
            
            <div id="view-dashboard">
                <h2 id="dash-welcome-title" style="color: var(--accent);">Dashboard</h2>
                <div id="dashboard-today-agenda"></div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast">XP Updated</div>

    <script>
        // --- EMAIL CONFIGURATION ---
        // REPLACE WITH YOUR KEYS
        const SERVICE_ID = 'service_mfycgli';
        const STRIKE_TEMPLATE = 'template_ptlw8ff';
        const REPORT_TEMPLATE = 'template_0z19spp';
        const PUBLIC_KEY = 'DAhJlNrUs2aFVFxUZ';

        let accountabilityEmails = "";
        
        // --- EMAIL SENDER ---
        function sendAccountabilityEmail(type, params) {
            if (!accountabilityEmails) return;

            const templateID = (type === 'strike') ? STRIKE_TEMPLATE : REPORT_TEMPLATE;

            // EmailJS handles comma-separated strings perfectly in the "to_email" field
            const templateParams = {
                to_email: accountabilityEmails, // EmailJS sends to all comma-separated emails
                ...params
            };

            emailjs.send(SERVICE_ID, templateID, templateParams, PUBLIC_KEY)
                .then(res => console.log("Accountability email sent!"))
                .catch(err => console.error("Email error:", err));
        }

        function saveSettings() {
            const input = document.getElementById('inp-partner-email').value;
            // Clean up the string: replace semicolons with commas, remove whitespace
            const cleanEmails = input.split(/[,;]/).map(e => e.trim()).filter(e => e).join(', ');
            
            db.collection("userStats").doc("player").set({ accountabilityEmails: cleanEmails }, { merge: true }).then(() => {
                accountabilityEmails = cleanEmails;
                document.getElementById('inp-partner-email').value = cleanEmails;
                const msg = document.getElementById('settings-msg');
                msg.innerText = "Settings Saved!";
                msg.style.color = "#4caf50";
                setTimeout(() => msg.innerText = "", 3000);
            });
        }

        // --- FIREBASE & APP INITIALIZATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyAzQghlZIMFFhxj4szLWyE461qXkWsdQFo",
            authDomain: "master-planner-6687b.firebaseapp.com",
            projectId: "master-planner-6687b",
            storageBucket: "master-planner-6687b.firebasestorage.app",
            messagingSenderId: "1035219779102",
            appId: "1:1035219779102:web:f761fef6fd46ade3ef780f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // Load Global Stats
        db.collection("userStats").doc("player").onSnapshot(doc => {
            if(doc.exists) {
                userXP = doc.data().xp || 0;
                accountabilityEmails = doc.data().accountabilityEmails || "";
                document.getElementById('inp-partner-email').value = accountabilityEmails;
            }
            renderXP();
        });

        // Initialize UI
        function initializeNotifications() {
            if ("Notification" in window && Notification.permission === "default") {
                Notification.requestPermission();
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.querySelectorAll('.action-btn').forEach(btn => {
                btn.onclick = () => {
                    initializeNotifications();
                    switchView(btn.dataset.view, btn);
                };
            });
        });

        function switchView(view, btnElement) {
            document.querySelectorAll('.subbar .tab-btn').forEach(b => b.classList.remove('active'));
            if(btnElement) btnElement.classList.add('active');
            
            document.getElementById('view-dashboard').style.display = (view === 'dashboard') ? 'block' : 'none';
            document.getElementById('view-settings').style.display = (view === 'settings') ? 'flex' : 'none';
            document.getElementById('view-missions').style.display = (view === 'missions') ? 'flex' : 'none';
            // ... (Add builder/schedule visibility logic here)
        }

        // Simple Toast Notification
        function showToast(msg, color) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.style.borderColor = color;
            toast.style.color = color;
            toast.style.opacity = 1;
            setTimeout(() => { toast.style.opacity = 0; }, 3000);
        }

        function renderXP() {
            document.getElementById('player-xp-text').innerText = `${userXP} XP`;
            let fillPct = (userXP % 300) / 300 * 100;
            document.getElementById('xp-bar-fill').style.width = `${fillPct}%`;
        }

    </script>
</body>
</html>
