<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineering Tracker Pro</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-dark: #0a1414;
            --bg-panel: #112222;
            --accent: #84ffff; 
            --text-main: #e0f7fa; 
            --text-muted: #b2ebf2; 
            --outline: #26c6da; 
            
            --c1: #ff5252; /* Course 1 (e.g. MMAN) */
            --c2: #448aff; /* Course 2 (e.g. ENGG/MATH) */
            --c3: #18ffff; /* Course 3 (e.g. ELEC) */
        }
        body {
            margin: 0;
            font-family: 'Rajdhani', sans-serif; 
            font-size: 18px;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        
        /* Tier 1: Term Navigation */
        .topbar {
            background-color: var(--bg-dark);
            padding: 10px 20px;
            display: flex;
            gap: 15px;
            border-bottom: 1px solid rgba(38, 198, 218, 0.3);
            align-items: center;
        }
        .logo {
            font-size: 24px;
            font-weight: 700;
            color: var(--accent);
            margin-right: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .term-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            padding: 5px 10px;
            font-family: 'Rajdhani', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 3px solid transparent;
        }
        .term-btn:hover { color: var(--accent); }
        .term-btn.active { color: var(--accent); border-bottom: 3px solid var(--accent); }

        #live-clock {
            margin-left: auto;
            font-family: 'Share Tech Mono', monospace;
            font-size: 18px;
            color: var(--accent);
            background: rgba(0, 0, 0, 0.3);
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--outline);
            white-space: nowrap;
            box-shadow: inset 0 0 10px rgba(38, 198, 218, 0.1);
        }

        /* Tier 2: Week Navigation */
        .subbar {
            background-color: var(--bg-panel);
            padding: 10px 20px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            border-bottom: 1px solid var(--outline);
            align-items: center;
        }
        .tab-btn {
            background: rgba(0,0,0,0.2);
            border: 1px solid var(--outline);
            color: var(--text-muted);
            padding: 6px 14px;
            border-radius: 15px;
            cursor: pointer;
            font-weight: 700;
            font-size: 15px;
            transition: 0.2s;
            white-space: nowrap;
            font-family: 'Rajdhani', sans-serif; 
            letter-spacing: 1px;
        }
        .tab-btn:hover { border-color: var(--accent); color: var(--accent); }
        .tab-btn.active { background-color: var(--accent); color: var(--bg-dark); border-color: var(--accent); }
        .home-btn { background-color: #113333; color: var(--text-main); border-color: var(--outline); margin-right: 10px; }

        /* Main Layout */
        .container { display: flex; flex: 1; overflow: hidden; }

        .sidebar {
            width: 250px;
            background-color: var(--bg-panel);
            padding: 20px;
            border-right: 1px solid var(--outline);
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }
        .sidebar h3 { margin-top: 0; color: var(--accent); font-size: 18px; text-transform: uppercase; border-bottom: 1px solid var(--outline); padding-bottom: 5px; letter-spacing: 2px;}
        .course-btn {
            background: rgba(0,0,0,0.2); border: 1px solid transparent; color: var(--text-muted);
            padding: 12px; border-radius: 8px; cursor: pointer; text-align: left;
            font-weight: 600; font-size: 16px; border-left: 4px solid var(--outline); transition: 0.2s;
            font-family: 'Rajdhani', sans-serif; letter-spacing: 1px;
        }
        .course-btn:hover { border-color: var(--outline); }
        .course-btn[data-course="All"].active { border-left-color: var(--accent); background: rgba(38, 198, 218, 0.2); color: var(--text-main); }
        .course-btn[data-course="Course1"].active { border-left-color: var(--c1); background: rgba(255, 82, 82, 0.15); color: var(--text-main); }
        .course-btn[data-course="Course2"].active { border-left-color: var(--c2); background: rgba(68, 138, 255, 0.15); color: var(--text-main); }
        .course-btn[data-course="Course3"].active { border-left-color: var(--c3); background: rgba(24, 255, 255, 0.15); color: var(--text-main); }

        .content { flex: 1; padding: 30px; overflow-y: auto; }
        
        .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h2 { color: var(--accent); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin: 0 0 15px 0;}
        .chart-container {
            width: 100%; height: 250px; background: var(--bg-panel);
            padding: 20px; border-radius: 8px; box-sizing: border-box; margin-bottom: 30px;
            position: relative; border: 1px solid var(--outline);
        }

        .day-section { margin-bottom: 30px; }
        .day-title { border-bottom: 2px solid var(--outline); padding-bottom: 10px; margin-bottom: 15px; color: var(--accent); font-size: 24px;}
        .event-card {
            background-color: var(--bg-panel); padding: 15px; border-radius: 8px;
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-start; 
            transition: all 0.3s ease; border-left: 4px solid var(--outline);
            border-top: 1px solid rgba(38, 198, 218, 0.2);
            border-right: 1px solid rgba(38, 198, 218, 0.2);
            border-bottom: 1px solid rgba(38, 198, 218, 0.2);
        }
        .event-info { flex: 1; padding-right: 15px; }
        .event-info strong { display: block; font-size: 20px; font-weight: 700; margin-bottom: 5px; letter-spacing: 0.5px; }
        .event-info span { color: var(--text-muted); font-size: 16px; font-weight: 600; }
        .event-desc { color: #a0c4c4; font-size: 16px; margin-top: 8px; line-height: 1.4; font-weight: 400; border-left: 2px solid rgba(38, 198, 218, 0.3); padding-left: 10px; }
        
        .event-time { 
            font-family: 'Share Tech Mono', monospace;
            font-size: 18px; background: rgba(0,0,0,0.4); padding: 6px 12px; 
            border-radius: 5px; color: var(--accent); border: 1px solid var(--outline); 
            white-space: nowrap; 
        }
        
        .tag-Course1 { color: var(--c1) !important; }
        .tag-Course2 { color: var(--c2) !important; }
        .tag-Course3 { color: var(--c3) !important; }
        .tag-Routine { color: var(--text-muted); }

        .event-past { opacity: 0.35; filter: grayscale(80%); }
        .event-live { border-left-color: var(--accent); background-color: rgba(38, 198, 218, 0.1); transform: scale(1.02); box-shadow: 0 0 15px rgba(38, 198, 218, 0.2); }
        .event-live .event-time { background: var(--accent); color: var(--bg-dark); border-color: var(--accent); font-weight: bold; }
        
    </style>
</head>
<body>

    <div class="topbar" id="term-tabs">
        <div class="logo">🎯 <span>Tracker Pro</span></div>
        <button class="term-btn active" data-term="1">Term 1</button>
        <button class="term-btn" data-term="2">Term 2</button>
        <div id="live-clock">Loading Time...</div>
    </div>

    <div class="subbar" id="week-tabs">
        <button class="tab-btn home-btn active" data-week="home">Dashboard</button>
        </div>

    <div class="container">
        <div class="sidebar" id="course-tabs">
            <h3>Filters</h3>
            <button class="course-btn active" data-course="All">All Subjects</button>
            <button class="course-btn" id="filter-c1" data-course="Course1">Course 1</button>
            <button class="course-btn" id="filter-c2" data-course="Course2">Course 2</button>
            <button class="course-btn" id="filter-c3" data-course="Course3">Course 3</button>
        </div>

        <div class="content" id="main-content">
            <div id="view-home">
                <div class="chart-header">
                    <h2 id="chart-title">Term Workload Tracker</h2>
                    <button id="btn-back-chart">⬅ Back to Term View</button>
                </div>
                <div class="chart-container">
                    <canvas id="termChart"></canvas>
                </div>
                <div id="live-timeline-container">
                    <h2 class="day-title" id="live-day-title">Today's Live Timeline</h2>
                    <div id="live-schedule"></div>
                </div>
            </div>

            <div id="view-schedule" style="display: none;">
                <h2 id="weekly-chart-title">Weekly Breakdown</h2>
                <div class="chart-container">
                    <canvas id="weeklyChart"></canvas>
                </div>
                <div id="weekly-schedule-content"></div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. CLOCK LOGIC ---
        function updateClock() {
            const now = new Date();
            const options = { 
                timeZone: 'Australia/Sydney', weekday: 'short', year: 'numeric', month: 'short', 
                day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true 
            };
            document.getElementById('live-clock').innerText = new Intl.DateTimeFormat('en-AU', options).format(now);
        }
        setInterval(updateClock, 1000);
        updateClock();

        function format12Hour(timeStr) {
            let [hours, minutes] = timeStr.split(':');
            hours = parseInt(hours, 10);
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12 || 12; 
            return `${hours}:${minutes} ${ampm}`;
        }

        // --- 2. DATA ARCHITECTURE ---
        // Term-specific configurations
        const termConfig = {
            1: {
                courses: {
                    Course1: "MATH1231",
                    Course2: "MMAN2700",
                    Course3: "ELEC1111"
                },
                stressLevels: [5, 6, 6, 8, 9, 2, 7, 8, 9, 10, 5, 10] // Placeholder Term 1 stress
            },
            2: {
                courses: {
                    Course1: "MMAN1130",
                    Course2: "ENGG1811",
                    Course3: "ELEC1111" // Assuming Retake for now
                },
                stressLevels: [3, 4, 6, 8, 10, 2, 9, 7, 8, 9, 4, 10] // Accurate Term 2 stress
            }
        };

        const dailyStressProfile = [6, 8, 9, 7, 5, 2, 4]; 

        // The Master Database
        const masterScheduleData = [
            // --- TERM 2 DATA (Your current hybrid schedule) ---
            { term: 2, week: 1, day: "Monday", course: "Routine", title: "Wake & Commute", start: "07:00", end: "09:00", location: "Bus", desc: "Pull espresso (58mm), review last week's notes on Anki during the bus ride." },
            { term: 2, week: 1, day: "Monday", course: "Course3", title: "ELEC Sprint: Hard Problems", start: "09:00", end: "11:00", location: "On-Campus", desc: "Do 3 hard problems with a blank page. High-yield work: failing at Nodal Analysis and figuring out why is worth 3 hours of highlighting a textbook." },
            { term: 2, week: 1, day: "Monday", course: "Course2", title: "ENGG1811 Lecture", start: "14:00", end: "16:00", location: "Rex Vowels", desc: "Focus on the logic of control structures." },
            { term: 2, week: 1, day: "Monday", course: "Course1", title: "MMAN1130 Lecture", start: "16:00", end: "18:00", location: "Science Th", desc: "Note down AS1100 standards and 'Why' a manufacturing process is chosen." },
            { term: 2, week: 1, day: "Monday", course: "Routine", title: "Gym Session", start: "19:00", end: "20:00", location: "Gym", desc: "Reset the brain after the heavy lecture block." },
            
            // --- TERM 1 DATA (Placeholders waiting for your input) ---
            { term: 1, week: 1, day: "Tuesday", course: "Course1", title: "MATH1231 Lecture", start: "10:00", end: "12:00", location: "TBA", desc: "Placeholder for Term 1 Data" },
            { term: 1, week: 1, day: "Wednesday", course: "Course2", title: "MMAN2700 Thermo", start: "14:00", end: "16:00", location: "TBA", desc: "Placeholder for Term 1 Data" }
        ];

        // --- 3. STATE & NAVIGATION SETUP ---
        let currentTerm = 2; // Default to Term 2
        let currentWeek = "home"; 
        let currentCourseFilter = "All";

        // Generate Week Tabs
        const weekTabsContainer = document.getElementById('week-tabs');
        for (let i = 1; i <= 12; i++) {
            const btn = document.createElement('button');
            btn.className = `tab-btn`;
            btn.innerText = `Week ${i}`;
            btn.dataset.week = i;
            btn.onclick = (e) => switchWeek(e.target, i);
            weekTabsContainer.appendChild(btn);
        }

        // Setup Term Buttons
        document.querySelectorAll('.term-btn').forEach(btn => {
            btn.onclick = (e) => {
                document.querySelectorAll('.term-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentTerm = parseInt(e.target.dataset.term);
                updateUIForTerm();
                if (currentWeek === "home") {
                    updateTermChart();
                    updateLiveTimeline();
                } else {
                    updateWeeklyChart(currentWeek);
                    renderWeeklySchedule();
                }
            };
        });

        document.querySelector('.home-btn').onclick = (e) => switchWeek(e.target, "home");

        function switchWeek(element, target) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(element) element.classList.add('active');
            else if(target !== "home") document.querySelector(`.tab-btn[data-week="${target}"]`).classList.add('active');

            currentWeek = target;
            if(target === "home") {
                document.getElementById('view-home').style.display = 'block';
                document.getElementById('view-schedule').style.display = 'none';
                updateTermChart();
                updateLiveTimeline();
            } else {
                document.getElementById('view-home').style.display = 'none';
                document.getElementById('view-schedule').style.display = 'block';
                document.getElementById('weekly-chart-title').innerText = `Term ${currentTerm} - Week ${target} Daily Workload`;
                updateWeeklyChart(target);
                renderWeeklySchedule();
            }
        }

        // Setup Sidebar Filters
        document.querySelectorAll('.course-btn').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.course-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCourseFilter = btn.getAttribute('data-course');
                if (currentWeek !== "home") renderWeeklySchedule();
                if (currentWeek === "home") updateLiveTimeline();
            };
        });

        function updateUIForTerm() {
            // Update Sidebar Labels based on Term config
            const config = termConfig[currentTerm];
            document.getElementById('filter-c1').innerText = config.courses.Course1;
            document.getElementById('filter-c2').innerText = config.courses.Course2;
            document.getElementById('filter-c3').innerText = config.courses.Course3;
            document.getElementById('chart-title').innerText = `Term ${currentTerm} Workload Tracker`;
        }

        // --- 4. CHARTS CONFIGURATION ---
        Chart.defaults.color = '#84ffff';
        Chart.defaults.font.family = 'Rajdhani';

        const ctxTerm = document.getElementById('termChart').getContext('2d');
        const termLabels = Array.from({length: 12}, (_, i) => `Wk ${i+1}`);
        let termChart = new Chart(ctxTerm, {
            type: 'line',
            data: { labels: termLabels, datasets: [{
                label: 'Stress / Workload', data: [], borderColor: '#84ffff', backgroundColor: 'rgba(132, 255, 255, 0.15)',
                borderWidth: 3, pointBackgroundColor: '#fff', pointRadius: 6, pointHoverRadius: 8, fill: true, tension: 0.3
            }]},
            options: {
                responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true, max: 10, grid: {color:'rgba(38, 198, 218, 0.2)'} }, x: { grid: {color:'rgba(38, 198, 218, 0.2)'}, ticks:{font:{size: 16, weight: 'bold'}} } },
                onClick: (e, activeElements) => { if (activeElements.length > 0) { switchWeek(null, activeElements[0].index + 1); } }
            }
        });

        const ctxWeek = document.getElementById('weeklyChart').getContext('2d');
        let weeklyChart = new Chart(ctxWeek, {
            type: 'line',
            data: { labels: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"], datasets: [{
                label: 'Daily Workload', data: [], borderColor: '#b2ebf2', backgroundColor: 'rgba(178, 235, 242, 0.15)',
                borderWidth: 3, pointBackgroundColor: '#fff', pointRadius: 6, pointHoverRadius: 8, fill: true, tension: 0.3
            }]},
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true, max: 10, grid: {color:'rgba(38, 198, 218, 0.2)'} }, x: { grid: {color:'rgba(38, 198, 218, 0.2)'}, ticks:{font:{size: 16, weight: 'bold'}} } } }
        });

        function updateTermChart() {
            termChart.data.datasets[0].data = termConfig[currentTerm].stressLevels;
            termChart.update();
        }

        function updateWeeklyChart(weekNum) {
            const weekMultiplier = termConfig[currentTerm].stressLevels[weekNum - 1] / 5; 
            const zoomedData = dailyStressProfile.map(val => Math.min(10, Math.max(1, Math.round(val * weekMultiplier))));
            weeklyChart.data.datasets[0].data = zoomedData;
            weeklyChart.update();
        }

        // --- 5. SCHEDULE LOGIC ---
        function timeToMinutes(timeStr) { const [hours, mins] = timeStr.split(':').map(Number); return hours * 60 + mins; }

        function createCard(event, stateClass) {
            const displayStart = format12Hour(event.start);
            const displayEnd = format12Hour(event.end);
            const descHtml = event.desc ? `<div class="event-desc">${event.desc}</div>` : "";
            
            // Map generic Course1/2/3 to actual names for display
            let displayCourseName = event.course;
            if(event.course !== "Routine") {
                displayCourseName = termConfig[currentTerm].courses[event.course];
            }

            const card = document.createElement('div');
            card.className = `event-card ${stateClass}`;
            card.innerHTML = `
                <div class="event-info">
                    <strong class="tag-${event.course}">${displayCourseName} | ${event.title}</strong>
                    <span>📍 ${event.location}</span>
                    ${descHtml}
                </div>
                <div class="event-time">${displayStart} - ${displayEnd}</div>
            `;
            return card;
        }

        function updateLiveTimeline() {
            const container = document.getElementById('live-schedule');
            container.innerHTML = '';
            
            const daysOfWeek = ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];
            const now = new Date();
            const currentDayStr = daysOfWeek[now.getDay()];
            const currentMins = now.getHours() * 60 + now.getMinutes();

            document.getElementById('live-day-title').innerText = `Today's Live Timeline (${currentDayStr})`;

            // Filter for current term, current day, and default to Week 1 for now
            let todaysEvents = masterScheduleData.filter(e => e.term === currentTerm && e.day === currentDayStr && e.week === 1); 
            if (currentCourseFilter !== "All") todaysEvents = todaysEvents.filter(e => e.course === currentCourseFilter);
            
            if (todaysEvents.length === 0) {
                container.innerHTML = `<p style="color:var(--text-muted);">No specific tasks scheduled for today. Hit the books or take a break!</p>`;
                return;
            }

            todaysEvents.sort((a, b) => timeToMinutes(a.start) - timeToMinutes(b.start));

            todaysEvents.forEach(event => {
                let stateClass = "";
                if (currentMins >= timeToMinutes(event.end)) stateClass = "event-past";
                else if (currentMins >= timeToMinutes(event.start) && currentMins < timeToMinutes(event.end)) stateClass = "event-live";

                container.appendChild(createCard(event, stateClass));
            });
        }

        function renderWeeklySchedule() {
            const display = document.getElementById('weekly-schedule-content');
            display.innerHTML = '';

            let filteredData = masterScheduleData.filter(e => e.term === currentTerm && e.week === currentView);
            if (currentCourseFilter !== "All") filteredData = filteredData.filter(e => e.course === currentCourseFilter);

            if (filteredData.length === 0) {
                display.innerHTML = `<h3 style="color: var(--text-muted); text-align: center; margin-top: 50px;">No schedule data found for Term ${currentTerm}, Week ${currentView}.</h3>`;
                return;
            }

            const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
            days.forEach(day => {
                const dayEvents = filteredData.filter(e => e.day === day);
                if (dayEvents.length > 0) {
                    dayEvents.sort((a, b) => timeToMinutes(a.start) - timeToMinutes(b.start));
                    const daySection = document.createElement('div');
                    daySection.className = 'day-section';
                    daySection.innerHTML = `<h2 class="day-title">${day}</h2>`;
                    
                    dayEvents.forEach(event => {
                        daySection.appendChild(createCard(event, ""));
                    });
                    display.appendChild(daySection);
                }
            });
        }

        // Initialize
        updateUIForTerm();
        updateTermChart();
        updateLiveTimeline();

        setInterval(() => {
            if (currentWeek === "home") updateLiveTimeline();
        }, 60000);

    </script>
</body>
</html>
